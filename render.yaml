# Render Blueprint: RevenueOS Web Service
# https://render.com/docs/blueprint-spec
# Set in Render Dashboard: SECRET_KEY, STRIPE_CLIENT_ID, STRIPE_CLIENT_SECRET, STRIPE_REDIRECT_URI (optional)
services:
  - type: web
    name: revenueos
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
