# Render Blueprint: RevenueOS Web Service
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: revenueos
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
