<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RevenueOS Console</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;margin:0;background:#f7f8fa;color:#1a1d21;line-height:1.5;min-height:100vh}
    .container{max-width:1100px;margin:0 auto;padding:0 1.5rem 2rem}
    .nav{background:#fff;border-bottom:1px solid #e6e9ec;padding:0.75rem 0}
    .nav .container{display:flex;align-items:center;gap:1.5rem}
    .nav a{color:#374151;text-decoration:none;font-size:0.9375rem;font-weight:500}
    .nav a:hover{color:#635bff}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start;margin-top:1.5rem}
    @media (max-width:768px){.grid{grid-template-columns:1fr}}
    .card{background:#fff;border:1px solid #e6e9ec;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,0.04);padding:1.5rem}
    .card-title{margin:0 0 1rem;font-size:0.9375rem;font-weight:600;color:#374151}
    .btn{padding:0.5rem 1rem;font-size:0.875rem;font-weight:500;border-radius:6px;border:none;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
    .btn-primary{background:#635bff;color:#fff}
    .btn-primary:hover:not(:disabled){background:#5851e6}
    .btn-secondary{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}
    .btn-secondary:hover:not(:disabled){background:#e5e7eb}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .btn+ .btn{margin-left:0.5rem;margin-top:0.25rem}
    .chip{font-size:0.75rem;font-weight:500;padding:0.25rem 0.5rem;border-radius:4px;display:inline-block}
    .chip-green{background:#d1fae5;color:#065f46}
    .chip-gray{background:#f3f4f6;color:#6b7280}
    .chip-amber{background:#fef3c7;color:#92400e}
    .chip-red{background:#fee2e2;color:#991b1b}
    .operator-summary{font-size:1rem;color:#374151;line-height:1.6;margin:0 0 1rem;padding:1rem;background:#f9fafb;border-radius:6px;border-left:4px solid #635bff}
    .priority-statement{font-size:0.9375rem;font-weight:600;color:#1e40af;margin:0 0 1rem}
    .constraint-block{margin:1rem 0}
    .constraint-block h3{font-size:0.875rem;font-weight:600;text-transform:uppercase;letter-spacing:0.03em;color:#6b7280;margin:0 0 0.5rem}
    .constraint-type{font-size:1.125rem;font-weight:700;color:#1a1d21}
    .callout{background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:1rem;margin:1rem 0;font-size:0.9375rem;color:#1e40af}
    .callout strong{color:#1e3a8a}
    .exp-list{list-style:none;padding:0;margin:0}
    .exp-card{background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:1rem;margin-bottom:0.75rem;font-size:0.875rem}
    .exp-card h4{margin:0 0 0.5rem;font-size:1rem}
    .exp-card details{margin-top:0.5rem}
    .exp-card details summary{cursor:pointer;color:#635bff;font-size:0.8125rem}
    .exp-card details ul{margin:0.5rem 0 0 1.25rem;padding:0}
    .error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:0.75rem;margin:1rem 0;font-size:0.875rem;color:#991b1b}
    .spinner{display:inline-block;width:0.9em;height:0.9em;border:2px solid #e5e7eb;border-top-color:#635bff;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:-0.15em;margin-right:0.35em}
    @keyframes spin{to{transform:rotate(360deg)}}
    .disclaimer{font-size:0.75rem;color:#b45309;margin-top:0.5rem}
    .advanced{margin-top:1.25rem;padding-top:1rem;border-top:1px solid #e6e9ec}
    .advanced summary{cursor:pointer;font-size:0.8125rem;color:#6b7280;font-weight:500}
    .advanced pre{background:#1f2937;color:#e5e7eb;padding:1rem;border-radius:6px;font-size:0.75rem;overflow:auto;max-height:300px;margin-top:0.5rem;white-space:pre-wrap;word-break:break-word}
    .actions-row{display:flex;flex-wrap:wrap;gap:0.5rem;margin:1rem 0}
    .placeholder{color:#9ca3af;font-size:0.875rem;padding:1rem 0}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="/">Home</a>
      <a href="/console">Console</a>
      <a href="/docs">Docs</a>
      <a href="/security">Security</a>
    </div>
  </nav>

  <main class="container">
    <div class="grid">
      <div>
        <div class="card">
          <h2 class="card-title">Stripe Connection</h2>
          <div id="connectionStatus">
            <span class="chip chip-gray">Checking…</span>
          </div>
          <p id="connectionAccount" style="font-size:0.875rem;color:#6b7280;margin:0.5rem 0 0;display:none"></p>
          <div id="connectionActions" style="margin-top:0.75rem"></div>
        </div>
        <div class="card" style="margin-top:1rem">
          <h2 class="card-title">Run Analysis</h2>
          <button type="button" id="runLive" class="btn btn-primary" disabled>Run Live Analysis</button>
          <button type="button" id="runDemo" class="btn btn-secondary">Run One-Time Demo</button>
          <p class="disclaimer">Recommended: Connect via Stripe OAuth. Never paste live keys.</p>
        </div>
      </div>
      <div class="card">
        <h2 class="card-title">Results</h2>
        <div id="errorBox"></div>
        <div id="loadingState" style="display:none"><span class="spinner"></span> Running…</div>
        <div id="resultsContent">
          <p class="placeholder">Connect Stripe and run Live Analysis, or run One-Time Demo to see results.</p>
        </div>
        <div id="successActions" class="actions-row" style="display:none">
          <button type="button" id="copyFormatted" class="btn btn-secondary">Copy formatted report</button>
          <button type="button" id="downloadJson" class="btn btn-secondary">Download JSON</button>
        </div>
        <details class="advanced">
          <summary>Advanced: raw JSON</summary>
          <pre id="rawJson"></pre>
        </details>
      </div>
    </div>
  </main>

  <script>
(function(){
  const connectionStatus = document.getElementById('connectionStatus');
  const connectionAccount = document.getElementById('connectionAccount');
  const connectionActions = document.getElementById('connectionActions');
  const runLive = document.getElementById('runLive');
  const runDemo = document.getElementById('runDemo');
  const errorBox = document.getElementById('errorBox');
  const loadingState = document.getElementById('loadingState');
  const resultsContent = document.getElementById('resultsContent');
  const successActions = document.getElementById('successActions');
  const copyFormattedBtn = document.getElementById('copyFormatted');
  const downloadJsonBtn = document.getElementById('downloadJson');
  const rawJsonPre = document.getElementById('rawJson');

  let lastFormatted = '';
  let lastReport = null;
  let connected = false;

  function esc(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function setLoading(loading){
    runLive.disabled = loading || !connected;
    runDemo.disabled = loading;
    loadingState.style.display = loading ? 'block' : 'none';
    if(!loading) resultsContent.style.display = 'block';
  }

  function showError(msg){
    errorBox.innerHTML = msg ? '<div class="error-box">' + esc(msg) + '</div>' : '';
    errorBox.style.display = msg ? 'block' : 'none';
  }

  function renderResults(data){
    const report = data.report || {};
    const primary = report.primary_constraint;
    const experiments = report.recommended_experiments || [];
    let html = '';

    if (report.operator_summary) {
      html += '<div class="operator-summary">' + esc(report.operator_summary) + '</div>';
    }
    if (report.priority_statement) {
      html += '<p class="priority-statement">' + esc(report.priority_statement) + '</p>';
    }
    if (primary) {
      html += '<div class="constraint-block"><h3>Primary constraint</h3>';
      html += '<p class="constraint-type">' + esc((primary.constraint_type || '').replace(/_/g, ' ')) + '</p>';
      html += '<span class="chip chip-amber">' + esc(String(primary.affected_metric || '')) + '</span> ';
      if (primary.confidence_score != null) html += '<span class="chip chip-gray">Confidence: ' + esc(String(primary.confidence_score)) + '</span>';
      html += '</div>';
    }
    if (report.next_action) {
      html += '<div class="callout"><strong>Next action</strong><br>' + esc(report.next_action) + '</div>';
    }
    if (experiments.length) {
      html += '<h3 style="font-size:0.875rem;margin:1rem 0 0.5rem">Recommended experiments</h3><ul class="exp-list">';
      experiments.slice(0, 3).forEach(function(exp){
        html += '<li class="exp-card"><h4>' + esc(exp.title || '') + '</h4>';
        if (exp.expected_impact_range) html += '<span class="chip chip-gray">' + esc(exp.expected_impact_range) + '</span> ';
        if (exp.effort != null) html += '<span class="chip chip-gray">Effort: ' + esc(String(exp.effort)) + '</span>';
        if (exp.hypothesis) html += '<p style="margin:0.5rem 0 0">' + esc(exp.hypothesis) + '</p>';
        if (exp.implementation_steps && exp.implementation_steps.length) {
          html += '<details><summary>Steps</summary><ul>';
          exp.implementation_steps.forEach(function(step){ html += '<li>' + esc(step) + '</li>'; });
          html += '</ul></details>';
        }
        html += '</li>';
      });
      html += '</ul>';
    }
    resultsContent.innerHTML = html || '<p class="placeholder">No results.</p>';
    rawJsonPre.textContent = JSON.stringify(data, null, 2);
  }

  function onResult(data){
    showError('');
    setLoading(false);
    lastFormatted = (data.formatted != null) ? String(data.formatted) : '';
    lastReport = data.report || null;
    renderResults(data);
    successActions.style.display = 'block';
  }

  function fetchStatus(){
    fetch('/connect/status', { credentials: 'same-origin' })
      .then(function(r){ return r.json(); })
      .then(function(d){
        connected = d.connected === true;
        if (connected) {
          connectionStatus.innerHTML = '<span class="chip chip-green">Monitoring Active</span>';
          if (d.account_id) {
            connectionAccount.textContent = 'Connected as ' + d.account_id;
            connectionAccount.style.display = 'block';
          }
          connectionActions.innerHTML = '<form method="post" action="/connect/logout" style="display:inline"><button type="submit" class="btn btn-secondary">Disconnect</button></form>';
          runLive.disabled = false;
        } else {
          connectionStatus.innerHTML = '<span class="chip chip-gray">Not connected</span>';
          connectionAccount.style.display = 'none';
          connectionActions.innerHTML = '<a href="/connect/stripe" class="btn btn-primary">Connect Stripe</a>';
          runLive.disabled = true;
        }
      })
      .catch(function(){ connectionStatus.innerHTML = '<span class="chip chip-red">Error</span>'; });
  }

  runDemo.addEventListener('click', function(){
    showError('');
    setLoading(true);
    resultsContent.innerHTML = '';
    rawJsonPre.textContent = '';
    successActions.style.display = 'none';
    fetch('/analyze/demo', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}', credentials: 'same-origin' })
      .then(function(r){ return r.json().then(function(j){ return { ok: r.ok, data: j }; }); })
      .then(function(o){
        if (!o.ok) { showError(o.data.detail || 'Request failed'); setLoading(false); resultsContent.innerHTML = '<p class="placeholder">Request failed.</p>'; return; }
        onResult(o.data);
      })
      .catch(function(e){ showError(e.message); setLoading(false); resultsContent.innerHTML = '<p class="placeholder">Request failed.</p>'; });
  });

  runLive.addEventListener('click', function(){
    if (!connected) return;
    showError('');
    setLoading(true);
    resultsContent.innerHTML = '';
    rawJsonPre.textContent = '';
    successActions.style.display = 'none';
    fetch('/analyze/live', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}', credentials: 'same-origin' })
      .then(function(r){ return r.json().then(function(j){ return { ok: r.ok, data: j }; }); })
      .then(function(o){
        if (!o.ok) { showError(o.data.detail || 'Request failed'); setLoading(false); resultsContent.innerHTML = '<p class="placeholder">Request failed.</p>'; return; }
        onResult(o.data);
      })
      .catch(function(e){ showError(e.message); setLoading(false); resultsContent.innerHTML = '<p class="placeholder">Request failed.</p>'; });
  });

  copyFormattedBtn.addEventListener('click', function(){
    if (!lastFormatted) return;
    navigator.clipboard.writeText(lastFormatted).then(function(){ copyFormattedBtn.textContent = 'Copied'; setTimeout(function(){ copyFormattedBtn.textContent = 'Copy formatted report'; }, 2000); });
  });
  downloadJsonBtn.addEventListener('click', function(){
    if (!lastReport) return;
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(lastReport, null, 2)], { type: 'application/json' }));
    a.download = 'revenueos-report.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  fetchStatus();
  var params = new URLSearchParams(window.location.search);
  if (params.get('error') === 'oauth_denied') showError('Stripe connection was cancelled.');
  if (params.get('error') === 'token_exchange_failed') showError('Stripe token exchange failed. Try again.');
  if (params.get('error') === 'stripe_not_configured') showError('Stripe Connect is not configured on this server.');
})();
  </script>
</body>
</html>
