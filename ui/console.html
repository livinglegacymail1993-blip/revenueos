<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RevenueOS Operator Console</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background: #f7f8fa;
      color: #1a1d21;
      line-height: 1.5;
      min-height: 100vh;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem 2rem;
    }
    .header-bar {
      background: #fff;
      border-bottom: 1px solid #e6e9ec;
      padding: 1rem 0;
    }
    .header-bar .container {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .header-bar h1 {
      margin: 0;
      font-size: 1.375rem;
      font-weight: 700;
      color: #1a1d21;
    }
    .header-bar .subtitle {
      width: 100%;
      font-size: 0.875rem;
      color: #6b7280;
      margin: 0.125rem 0 0 0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.5rem;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      border-radius: 4px;
      background: #d1fae5;
      color: #065f46;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
      margin-top: 1.5rem;
    }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
    }
    .card {
      background: #fff;
      border: 1px solid #e6e9ec;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      padding: 1.5rem;
    }
    .card-title {
      margin: 0 0 1.25rem;
      font-size: 0.9375rem;
      font-weight: 600;
      color: #374151;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #4b5563;
      margin-bottom: 0.35rem;
    }
    .form-group select,
    .form-group input[type="password"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.875rem;
      color: #1a1d21;
      background: #fff;
    }
    .form-group select:focus,
    .form-group input:focus {
      outline: none;
      border-color: #635bff;
      box-shadow: 0 0 0 3px rgba(99, 91, 255, 0.15);
    }
    .btn {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary {
      background: #635bff;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #5851e6;
    }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #e5e7eb;
    }
    .btn-secondary:hover:not(:disabled) {
      background: #e5e7eb;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn + .btn { margin-left: 0.5rem; margin-top: 0.25rem; }
    .helper {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 0.35rem;
    }
    .helper.warning { color: #b45309; }
    .divider {
      height: 1px;
      background: #e6e9ec;
      margin: 1.25rem 0;
    }
    .status-chips {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .chip {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
    .chip-loading { background: #fef3c7; color: #92400e; }
    .chip-ready { background: #d1fae5; color: #065f46; }
    .chip-error { background: #fee2e2; color: #991b1b; }
    .chip-idle { background: #f3f4f6; color: #6b7280; }
    .constraint-table {
      width: 100%;
      font-size: 0.8125rem;
      border-collapse: collapse;
      margin-bottom: 1rem;
    }
    .constraint-table th,
    .constraint-table td {
      text-align: left;
      padding: 0.5rem 0.5rem 0.5rem 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .constraint-table th {
      font-weight: 500;
      color: #6b7280;
      width: 38%;
    }
    .callout {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      color: #1e40af;
    }
    .callout strong { color: #1e3a8a; }
    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #6b7280;
      margin-bottom: 0.5rem;
    }
    .exp-list { list-style: none; padding: 0; margin: 0 0 1rem 0; }
    .exp-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.8125rem;
    }
    .exp-card h3 {
      margin: 0 0 0.5rem;
      font-size: 0.9375rem;
      font-weight: 600;
      color: #374151;
    }
    .exp-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.5rem;
    }
    .exp-badge {
      font-size: 0.6875rem;
      font-weight: 500;
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
      background: #e5e7eb;
      color: #4b5563;
    }
    .exp-card .hypothesis {
      color: #6b7280;
      margin-bottom: 0.5rem;
    }
    .exp-card details {
      margin-top: 0.5rem;
    }
    .exp-card details summary {
      cursor: pointer;
      font-size: 0.75rem;
      color: #635bff;
      font-weight: 500;
    }
    .exp-card details ul {
      margin: 0.5rem 0 0 1.25rem;
      padding: 0;
    }
    .exp-card details li { margin-bottom: 0.25rem; }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      color: #991b1b;
    }
    .error-box .status { font-weight: 600; }
    .spinner {
      display: inline-block;
      width: 0.9em;
      height: 0.9em;
      border: 2px solid #e5e7eb;
      border-top-color: #635bff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: -0.15em;
      margin-right: 0.35rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .running-text { color: #6b7280; font-size: 0.875rem; }
    .results-placeholder {
      color: #9ca3af;
      font-size: 0.875rem;
      padding: 0.5rem 0;
    }
    .actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .actions-row .btn { margin-left: 0; margin-top: 0; }
    .advanced {
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid #e6e9ec;
    }
    .advanced summary {
      cursor: pointer;
      font-size: 0.8125rem;
      color: #6b7280;
      font-weight: 500;
    }
    .advanced pre {
      background: #1f2937;
      color: #e5e7eb;
      padding: 1rem;
      border-radius: 6px;
      font-size: 0.75rem;
      overflow: auto;
      max-height: 300px;
      margin-top: 0.5rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <header class="header-bar">
    <div class="container">
      <h1>RevenueOS</h1>
      <span class="badge">Live</span>
      <p class="subtitle">Find your #1 revenue constraint and the next best experiments.</p>
    </div>
  </header>

  <main class="container">
    <div class="grid">
      <div class="card">
        <h2 class="card-title">Run Analysis</h2>
        <div class="form-group">
          <label for="scenario">Demo Scenario</label>
          <select id="scenario">
            <option value="">— None —</option>
            <option value="revenue_decline">revenue_decline</option>
            <option value="churn">churn</option>
            <option value="trial_conversion">trial_conversion</option>
            <option value="activation">activation</option>
          </select>
        </div>
        <button type="button" id="runDemo" class="btn btn-primary">Run Demo</button>

        <div class="divider"></div>

        <div class="form-group">
          <label for="stripeKey">Stripe API key</label>
          <input type="password" id="stripeKey" placeholder="sk_test_..." autocomplete="off">
          <p class="helper warning">Use test keys. Never paste live keys into a demo.</p>
        </div>
        <button type="button" id="runStripe" class="btn btn-secondary">Run Stripe Analysis</button>
      </div>

      <div class="card">
        <h2 class="card-title">Results</h2>
        <div class="status-chips">
          <span id="statusChip" class="chip chip-idle">Ready</span>
        </div>
        <div id="errorBox"></div>
        <div id="loadingState" class="running-text" style="display: none;">
          <span class="spinner"></span> Running…
        </div>
        <div id="resultsContent">
          <p class="results-placeholder">Run Demo or Run Stripe Analysis to see results.</p>
        </div>
        <div id="successActions" class="actions-row" style="display: none;">
          <button type="button" id="copyFormatted" class="btn btn-secondary">Copy formatted report</button>
          <button type="button" id="downloadJson" class="btn btn-secondary">Download JSON</button>
        </div>
        <details class="advanced">
          <summary>Advanced: raw JSON</summary>
          <pre id="rawJson"></pre>
        </details>
      </div>
    </div>
  </main>

  <script>
    (function () {
      const runDemoBtn = document.getElementById('runDemo');
      const runStripeBtn = document.getElementById('runStripe');
      const scenarioSelect = document.getElementById('scenario');
      const stripeKeyInput = document.getElementById('stripeKey');
      const statusChip = document.getElementById('statusChip');
      const errorBox = document.getElementById('errorBox');
      const loadingState = document.getElementById('loadingState');
      const resultsContent = document.getElementById('resultsContent');
      const successActions = document.getElementById('successActions');
      const copyFormattedBtn = document.getElementById('copyFormatted');
      const downloadJsonBtn = document.getElementById('downloadJson');
      const rawJsonPre = document.getElementById('rawJson');

      let lastFormatted = '';
      let lastReport = null;

      function setStatus(kind, label) {
        statusChip.className = 'chip chip-' + kind;
        statusChip.textContent = label;
      }

      function setLoading(loading) {
        runDemoBtn.disabled = loading;
        runStripeBtn.disabled = loading;
        loadingState.style.display = loading ? 'block' : 'none';
        if (!loading) resultsContent.style.display = 'block';
        if (loading) {
          setStatus('loading', 'Loading');
          successActions.style.display = 'none';
        }
      }

      function showError(status, message) {
        errorBox.innerHTML = status
          ? '<div class="error-box"><span class="status">' + escapeHtml(String(status)) + '</span> ' + escapeHtml(String(message)) + '</div>'
          : '';
        errorBox.style.display = status ? 'block' : 'none';
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function renderResults(data) {
        const report = data.report || {};
        const primary = report.primary_constraint;
        const nextAction = report.next_action || '';
        const experiments = report.recommended_experiments || [];

        let html = '';

        if (primary) {
          html += '<p class="section-label">Primary constraint</p>';
          html += '<table class="constraint-table"><tbody>';
          html += '<tr><th>Type</th><td>' + escapeHtml(primary.constraint_type || '—') + '</td></tr>';
          html += '<tr><th>Metric</th><td>' + escapeHtml(primary.affected_metric || '—') + '</td></tr>';
          html += '<tr><th>Delta</th><td>' + escapeHtml(primary.delta_percentage != null ? primary.delta_percentage + '%' : '—') + '</td></tr>';
          html += '<tr><th>Confidence</th><td>' + escapeHtml(primary.confidence_score != null ? String(primary.confidence_score) : '—') + '</td></tr>';
          html += '<tr><th>Score</th><td>' + escapeHtml(primary.constraint_score != null ? String(primary.constraint_score) : '—') + '</td></tr>';
          html += '</tbody></table>';
        } else {
          html += '<p class="section-label">Primary constraint</p>';
          html += '<p class="results-placeholder">No primary constraint detected.</p>';
        }

        if (nextAction) {
          html += '<p class="section-label">Next action</p>';
          html += '<div class="callout"><strong>Next action</strong><br>' + escapeHtml(nextAction) + '</div>';
        }

        if (experiments.length > 0) {
          html += '<p class="section-label">Recommended experiments</p>';
          html += '<ul class="exp-list">';
          experiments.slice(0, 3).forEach(function (exp) {
            html += '<li class="exp-card">';
            html += '<h3>' + escapeHtml(exp.title || '—') + '</h3>';
            html += '<div class="exp-badges">';
            if (exp.expected_impact_range) {
              html += '<span class="exp-badge">Impact: ' + escapeHtml(exp.expected_impact_range) + '</span>';
            }
            if (exp.effort != null) {
              html += '<span class="exp-badge">Effort: ' + escapeHtml(String(exp.effort)) + '</span>';
            }
            html += '</div>';
            if (exp.hypothesis) {
              html += '<div class="hypothesis">' + escapeHtml(exp.hypothesis) + '</div>';
            }
            if (exp.implementation_steps && exp.implementation_steps.length > 0) {
              html += '<details><summary>Implementation steps</summary><ul>';
              exp.implementation_steps.forEach(function (step) {
                html += '<li>' + escapeHtml(step) + '</li>';
              });
              html += '</ul></details>';
            }
            html += '</li>';
          });
          html += '</ul>';
        }

        resultsContent.innerHTML = html || '<p class="results-placeholder">No results to display.</p>';
        rawJsonPre.textContent = JSON.stringify(data, null, 2);
      }

      function showResult(data) {
        showError('');
        setLoading(false);
        setStatus('ready', 'Ready');
        lastFormatted = (data.formatted != null) ? String(data.formatted) : '';
        lastReport = data.report != null ? data.report : null;
        renderResults(data);
        successActions.style.display = 'block';
      }

      function copyFormatted() {
        if (!lastFormatted) return;
        navigator.clipboard.writeText(lastFormatted).then(function () {
          copyFormattedBtn.textContent = 'Copied';
          setTimeout(function () { copyFormattedBtn.textContent = 'Copy formatted report'; }, 2000);
        }).catch(function () {
          copyFormattedBtn.textContent = 'Copy failed';
          setTimeout(function () { copyFormattedBtn.textContent = 'Copy formatted report'; }, 2000);
        });
      }

      function downloadJson() {
        if (!lastReport) return;
        const blob = new Blob([JSON.stringify(lastReport, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'revenueos-report.json';
        a.click();
        URL.revokeObjectURL(a.href);
      }

      async function doDemo() {
        showError('');
        setLoading(true);
        resultsContent.innerHTML = '';
        rawJsonPre.textContent = '';
        lastFormatted = '';
        lastReport = null;
        try {
          const r = await fetch('/analyze/demo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}'
          });
          const data = await r.json();
          if (!r.ok) {
            setStatus('error', 'Error');
            showError(r.status, data.detail || r.statusText || 'Request failed');
            setLoading(false);
            resultsContent.innerHTML = '<p class="results-placeholder">Request failed.</p>';
            return;
          }
          showResult(data);
        } catch (e) {
          setStatus('error', 'Error');
          showError('Error', e.message || 'Request failed');
          setLoading(false);
          resultsContent.innerHTML = '<p class="results-placeholder">Request failed.</p>';
        }
      }

      async function doStripe() {
        const key = (stripeKeyInput.value || '').trim();
        if (!key) {
          showError('Validation', 'Enter a Stripe API key.');
          return;
        }
        showError('');
        setLoading(true);
        resultsContent.innerHTML = '';
        rawJsonPre.textContent = '';
        lastFormatted = '';
        lastReport = null;
        try {
          const r = await fetch('/analyze/stripe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ stripe_api_key: key })
          });
          const data = await r.json();
          if (!r.ok) {
            setStatus('error', 'Error');
            showError(r.status, data.detail || r.statusText || 'Request failed');
            setLoading(false);
            resultsContent.innerHTML = '<p class="results-placeholder">Request failed.</p>';
            return;
          }
          stripeKeyInput.value = '';
          showResult(data);
        } catch (e) {
          setStatus('error', 'Error');
          showError('Error', e.message || 'Request failed');
          setLoading(false);
          resultsContent.innerHTML = '<p class="results-placeholder">Request failed.</p>';
        }
      }

      runDemoBtn.addEventListener('click', doDemo);
      runStripeBtn.addEventListener('click', doStripe);
      copyFormattedBtn.addEventListener('click', copyFormatted);
      downloadJsonBtn.addEventListener('click', downloadJson);
    })();
  </script>
</body>
</html>
